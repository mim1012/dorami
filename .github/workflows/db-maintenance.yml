name: DB Maintenance (One-time)
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email to reset profile for'
        required: true
        type: string
jobs:
  reset-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.PRODUCTION_SSH_KEY }}
          ssh-host: ${{ secrets.PRODUCTION_HOST }}
      - name: Reset user profile
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          EMAIL: ${{ inputs.email }}
        run: |
          ssh "$USER@$HOST" bash << ENDSSH
          docker exec dorami-postgres-1 psql -U app_user -d live_commerce_production -c "
            BEGIN;
            DELETE FROM order_items;
            DELETE FROM settlements;
            DELETE FROM orders;
            DELETE FROM reservations;
            DELETE FROM carts;
            DELETE FROM products;
            COMMIT;
            SELECT 'order_items' as tbl, COUNT(*) FROM order_items
            UNION ALL SELECT 'orders', COUNT(*) FROM orders
            UNION ALL SELECT 'products', COUNT(*) FROM products
            UNION ALL SELECT 'carts', COUNT(*) FROM carts
            UNION ALL SELECT 'reservations', COUNT(*) FROM reservations;
          "
          ENDSSH
