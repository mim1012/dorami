name: DB Maintenance (One-time)
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email to reset profile for'
        required: true
        type: string
jobs:
  reset-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          mkdir -p ~/.ssh
          if printf '%s' "$SSH_KEY" | grep -q "BEGIN"; then
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          else
            printf '%s' "$SSH_KEY" | base64 -d > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
      - name: Reset user profile
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          EMAIL: ${{ inputs.email }}
        run: |
          ssh "$USER@$HOST" bash << ENDSSH
          docker exec dorami-postgres-1 psql -U app_user -d live_commerce_production -c "SELECT email, \"instagramId\" FROM users WHERE \"instagramId\" LIKE '@@%' LIMIT 20;"
          docker exec dorami-postgres-1 psql -U app_user -d live_commerce_production -c "SELECT COUNT(*) as double_at FROM users WHERE \"instagramId\" LIKE '@@%';"
          ENDSSH
