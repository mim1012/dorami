name: Smoke Check

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend URL to test'
        required: false
        default: 'http://127.0.0.1:3001'
      client_url:
        description: 'Frontend URL to test'
        required: false
        default: 'http://127.0.0.1:3000'
  workflow_call:
    inputs:
      backend_url:
        description: 'Backend URL to test'
        required: false
        type: string
        default: 'http://127.0.0.1:3001'
      client_url:
        description: 'Frontend URL to test'
        required: false
        type: string
        default: 'http://127.0.0.1:3000'

env:
  NODE_VERSION: '20'

jobs:
  smoke-check:
    name: Smoke Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run smoke checks
        run: node scripts/smoke-check.mjs
        env:
          BACKEND_URL: ${{ inputs.backend_url || 'http://127.0.0.1:3001' }}
          CLIENT_URL: ${{ inputs.client_url || 'http://127.0.0.1:3000' }}
          SMOKE_TIMEOUT_MS: '10000'
