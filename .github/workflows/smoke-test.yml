# Deployment Smoke Test Workflow
#
# Starts the full stack (backend + frontend) against real PostgreSQL and Redis,
# then runs the 7-scenario Playwright smoke suite defined in
# client-app/e2e/smoke-deployment.spec.ts.
#
# A smoke failure blocks the merge / deployment — continue-on-error is intentionally
# NOT set on the Playwright step.
#
# Triggers:
#   - push to main or develop
#   - workflow_dispatch (manual run, e.g. after a hotfix)

name: Smoke Test

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # ── Backend ────────────────────────────────────────────────────────────────
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smoke_db?schema=public
  REDIS_URL: redis://localhost:6379
  REDIS_HOST: localhost
  REDIS_PORT: '6379'
  JWT_SECRET: smoke-jwt-secret-for-ci-only-32chars-ok
  KAKAO_CLIENT_ID: smoke-kakao-client-id
  KAKAO_CLIENT_SECRET: smoke-kakao-client-secret
  KAKAO_CALLBACK_URL: http://localhost:3001/api/auth/kakao/callback
  PROFILE_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  CSRF_ENABLED: 'false'
  COOKIE_SECURE: 'false'
  ENABLE_DEV_AUTH: 'true'
  ADMIN_EMAILS: admin@doremi.shop
  PORT: '3001'
  APP_ENV: development
  # ── Frontend ───────────────────────────────────────────────────────────────
  NEXT_PUBLIC_WS_URL: http://localhost:3001
  BACKEND_URL: http://127.0.0.1:3001
  # ── Playwright ─────────────────────────────────────────────────────────────
  PLAYWRIGHT_BASE_URL: http://localhost:3000

jobs:
  smoke:
    name: Smoke Test (7 scenarios)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smoke_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      # ── Checkout & Node ────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      # ── Install (workspace root — builds shared-types via postinstall) ─────
      - name: Install dependencies
        run: npm ci

      # ── Database setup ─────────────────────────────────────────────────────
      - name: Remove .env to force environment variables
        working-directory: backend
        run: rm -f .env .env.local

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run Prisma Migrations
        working-directory: backend
        run: |
          echo "DATABASE_URL is: $DATABASE_URL"
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # ── Build shared-types (already built by postinstall, but make explicit) ─
      - name: Build shared-types
        run: npm run build:shared

      # ── Build backend ──────────────────────────────────────────────────────
      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── Start backend in background ────────────────────────────────────────
      - name: Start backend server
        working-directory: backend
        run: npm run start:prod &
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          KAKAO_CLIENT_ID: ${{ env.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ env.KAKAO_CLIENT_SECRET }}
          KAKAO_CALLBACK_URL: ${{ env.KAKAO_CALLBACK_URL }}
          PROFILE_ENCRYPTION_KEY: ${{ env.PROFILE_ENCRYPTION_KEY }}
          CSRF_ENABLED: ${{ env.CSRF_ENABLED }}
          COOKIE_SECURE: ${{ env.COOKIE_SECURE }}
          ENABLE_DEV_AUTH: ${{ env.ENABLE_DEV_AUTH }}
          ADMIN_EMAILS: ${{ env.ADMIN_EMAILS }}
          PORT: ${{ env.PORT }}
          APP_ENV: ${{ env.APP_ENV }}
          CORS_ORIGINS: http://localhost:3000

      # ── Build & start frontend ─────────────────────────────────────────────
      - name: Build frontend
        working-directory: client-app
        run: npm run build
        env:
          NEXT_PUBLIC_WS_URL: ${{ env.NEXT_PUBLIC_WS_URL }}
          BACKEND_URL: ${{ env.BACKEND_URL }}

      - name: Start frontend server
        working-directory: client-app
        run: npm run start &
        env:
          PORT: '3000'
          NEXT_PUBLIC_WS_URL: ${{ env.NEXT_PUBLIC_WS_URL }}
          BACKEND_URL: ${{ env.BACKEND_URL }}

      # ── Wait for servers to be ready ───────────────────────────────────────
      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on :3001 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health/live > /dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Backend did not become ready within 60 seconds"
              exit 1
            fi
            sleep 2
          done

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend on :3000 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready after ${i} attempts"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Frontend did not become ready within 60 seconds"
              exit 1
            fi
            sleep 2
          done

      # ── Playwright ─────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        working-directory: client-app
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        working-directory: client-app
        run: |
          npx playwright test e2e/smoke-deployment.spec.ts \
            --project=user \
            --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}
          CI: 'true'
        # continue-on-error is intentionally omitted — smoke failure = deployment blocked

      # ── Artifacts on failure ───────────────────────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report-${{ github.sha }}
          path: client-app/playwright-report/
          retention-days: 7
