name: Staging SSH Diagnostic Test

on:
  workflow_dispatch:

jobs:
  ssh-test:
    name: SSH Connection Test
    runs-on: ubuntu-latest
    env:
      HOST: ${{ secrets.STAGING_HOST }}
      USER: ${{ secrets.STAGING_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.STAGING_SSH_KEY }}
          ssh-host: ${{ secrets.STAGING_HOST }}

      - name: Test SSH Connection
        run: |
          echo "Testing SSH connection to $USER@$HOST"
          ssh -v $USER@$HOST "whoami; pwd; uname -a" 2>&1 || exit 0

      - name: Check Docker Status
        run: |
          echo "=== Docker Status ==="
          ssh $USER@$HOST << 'ENDSSH' 2>&1 || true
          set -ex
          whoami
          pwd
          docker --version
          docker ps -a
          cd /opt/dorami 2>/dev/null && ls -la || echo "Directory not found"
          ENDSSH

      - name: Get Backend Logs
        run: |
          echo "=== Backend Container Logs ==="
          ssh $USER@$HOST << 'ENDSSH' 2>&1 || true
          docker logs dorami-backend-1 --tail=100 2>&1 || echo "Container not found"
          ENDSSH
