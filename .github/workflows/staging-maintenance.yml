name: Staging Maintenance

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Maintenance command to run'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - logs-backend
          - logs-frontend
          - logs-srs
          - logs-nginx
          - load-test-live
          - nginx-health
          - restart
          - restart-backend
          - restart-frontend
          - db-migrate
          - disk-usage
          - test-alimtalk
          - docker-cleanup
      stream_key:
        description: 'Optional stream key for load-test-live (blank=auto active stream)'
        required: false
        default: ''
        type: string
      concurrency:
        description: 'Concurrency for load-test-live'
        required: false
        default: '30'
        type: string
      duration_seconds:
        description: 'Duration seconds for load-test-live'
        required: false
        default: '60'
        type: string

jobs:
  run:
    name: Run Maintenance Command
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.STAGING_SSH_KEY }}
          ssh-host: ${{ secrets.STAGING_HOST }}

      - name: Execute Whitelisted Command
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          COMMAND: ${{ inputs.command }}
          STREAM_KEY_INPUT: ${{ inputs.stream_key }}
          CONCURRENCY: ${{ inputs.concurrency }}
          DURATION_SECONDS: ${{ inputs.duration_seconds }}
        run: |
          case "$COMMAND" in
            status)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml ps"
              ;;
            logs-backend)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml logs --tail=200 backend"
              ;;
            logs-frontend)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml logs --tail=200 frontend"
              ;;
            logs-srs)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml logs --tail=200 srs"
              ;;
            logs-nginx)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml logs --tail=200 nginx"
              ;;
            load-test-live)
              CMD="__RUN_LOAD_TEST_LIVE__"
              ;;
            nginx-health)
              CMD="__RUN_NGINX_HEALTH__"
              ;;
            restart)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml restart"
              ;;
            restart-backend)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml restart backend"
              ;;
            restart-frontend)
              CMD="docker compose -f docker-compose.base.yml -f docker-compose.staging.yml restart frontend"
              ;;
            db-migrate)
              CMD="docker exec dorami-postgres-1 psql -U postgres -d live_commerce_staging -c 'SELECT id, name, quantity, status FROM products ORDER BY status, name;'"
              ;;
            disk-usage)
              CMD="df -h / && docker system df"
              ;;
            test-alimtalk)
              CMD="__RUN_TEST_ALIMTALK__"
              ;;
            docker-cleanup)
              CMD="docker system prune -af --filter 'until=24h' && docker builder prune -af"
              ;;
            *)
              echo "Unknown command: $COMMAND"
              exit 1
              ;;
          esac

          if [ "$CMD" = "__RUN_LOAD_TEST_LIVE__" ]; then
            echo "Executing live load test in staging (concurrency=${CONCURRENCY}, duration=${DURATION_SECONDS}s)"
            ssh $USER@$HOST "bash -s -- \"$STREAM_KEY_INPUT\" \"$CONCURRENCY\" \"$DURATION_SECONDS\"" <<'ENDSSH'
              set -euo pipefail
              cd /opt/dorami

              STREAM_KEY="${1:-}"
              CONC="${2:-30}"
              DUR="${3:-60}"

              if [ -z "$STREAM_KEY" ]; then
                ACTIVE_JSON="$(curl -s http://localhost:3001/api/streaming/active)"
                STREAM_KEY="$(printf '%s' "$ACTIVE_JSON" | sed -n 's/.*"streamKey":"\([^"]*\)".*/\1/p')"
              fi

              if [ -z "$STREAM_KEY" ]; then
                echo "No active stream key found from /api/streaming/active. Aborting."
                exit 1
              fi

              echo "Using stream key: $STREAM_KEY"
              echo "Load target: http://localhost:8080/hls/${STREAM_KEY}.m3u8"
              echo "Start load test: concurrency=${CONC}, duration=${DUR}s"

              TMP_CODES="$(mktemp)"
              START_TS="$(date +%s)"

              while [ $(( $(date +%s) - START_TS )) -lt "$DUR" ]; do
                seq 1 "$CONC" | xargs -P "$CONC" -I{} sh -c \
                  'curl -m 5 -s -o /dev/null -w "%{http_code}\n" "http://localhost:8080/hls/'"$STREAM_KEY"'.m3u8" || echo "000"' \
                  >> "$TMP_CODES"
                sleep 1
              done

              TOTAL="$(wc -l < "$TMP_CODES" | tr -d ' ')"
              OK_200="$(grep -c '^200$' "$TMP_CODES" || true)"
              ERR_404="$(grep -c '^404$' "$TMP_CODES" || true)"
              ERR_5XX="$(grep -E -c '^5[0-9][0-9]$' "$TMP_CODES" || true)"
              ERR_000="$(grep -c '^000$' "$TMP_CODES" || true)"

              echo "=== Load Test Summary ==="
              echo "total=${TOTAL} ok_200=${OK_200} err_404=${ERR_404} err_5xx=${ERR_5XX} err_timeout_or_conn=${ERR_000}"
              echo "status_distribution:"
              sort "$TMP_CODES" | uniq -c | sort -nr

              echo "=== Container Stats Snapshot ==="
              docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" | \
                grep -E 'dorami-(backend|frontend|nginx|postgres|redis|srs)' || true

              rm -f "$TMP_CODES"
          ENDSSH
          elif [ "$CMD" = "__RUN_TEST_ALIMTALK__" ]; then
            echo "Triggering test alimtalk (node.js script inside backend container)"
            ssh $USER@$HOST 'cat > /tmp/alimtest.js' <<'ALIMSCRIPT'
            const http = require('http');
            function req(opts, body, jar) {
              return new Promise((res, rej) => {
                const h = {...(opts.headers||{})};
                if (jar && jar.length) h['Cookie'] = jar.map(c=>c.split(';')[0]).join('; ');
                if (body) h['Content-Length'] = Buffer.byteLength(body);
                const r = http.request({...opts, headers:h}, (resp) => {
                  let d=''; resp.on('data',c=>d+=c); resp.on('end',()=>res({s:resp.statusCode,b:d,ck:resp.headers['set-cookie']||[]}));
                });
                r.on('error',rej); if(body)r.write(body); r.end();
              });
            }
            async function main() {
              const H='localhost', P=3001; const jar=[];
              const login = await req({host:H,port:P,method:'POST',path:'/api/auth/dev-login',headers:{'Content-Type':'application/json'}},JSON.stringify({email:'dksk0359@gmail.com'}),jar);
              console.log('Login status:', login.s, login.b.slice(0,120));
              if(login.s<200||login.s>=300){console.error('Login failed');process.exit(1);}
              login.ck.forEach(c=>jar.push(c));
              const csrfCk=jar.find(c=>c.startsWith('csrf-token='));
              const csrfToken=csrfCk?decodeURIComponent(csrfCk.split(';')[0].split('=')[1]):'';
              console.log('CSRF token:', csrfToken.slice(0,20));
              const prods = await req({host:H,port:P,method:'GET',path:'/api/products?limit=1'},null,jar);
              prods.ck.forEach(c=>jar.push(c));
              const pd=JSON.parse(prods.b); const items=Array.isArray(pd.data)?pd.data:(pd.data||pd).items||pd.items||[];
              console.log('Items count:', items.length); if(!items.length){console.error('No products');process.exit(1);}
              const productId=items[0].id; console.log('Product:', productId);
              const csrfCk2=jar.find(c=>c.startsWith('csrf-token='));
              const csrfToken2=csrfCk2?decodeURIComponent(csrfCk2.split(';')[0].split('=')[1]):'';
              console.log('CSRF token after GET:', csrfToken2.slice(0,20));
              const cartRes = await req({host:H,port:P,method:'POST',path:'/api/cart',headers:{'Content-Type':'application/json','x-csrf-token':csrfToken2}},JSON.stringify({productId,quantity:1}),jar);
              console.log('Cart status:', cartRes.s, cartRes.b.slice(0,120));
              const cartId=JSON.parse(cartRes.b).data.id;
              const orderRes = await req({host:H,port:P,method:'POST',path:'/api/orders',headers:{'Content-Type':'application/json','x-csrf-token':csrfToken2}},JSON.stringify({cartId}),jar);
              console.log('Order status:', orderRes.s, orderRes.b.slice(0,120));
              const orderId=JSON.parse(orderRes.b).data.id;
              const confirm = await req({host:H,port:P,method:'POST',path:`/api/orders/${orderId}/confirm-payment`,headers:{'Content-Type':'application/json','x-csrf-token':csrfToken2}},JSON.stringify({}),jar);
              console.log('Confirm status:', confirm.s, confirm.b.slice(0,200));
              console.log('Done - alimtalk sent!');
            }
            main().catch(e=>{console.error(e);process.exit(1);});
          ALIMSCRIPT
            ssh $USER@$HOST "docker exec -i dorami-backend-1 node - < /tmp/alimtest.js"
          elif [ "$CMD" = "__RUN_NGINX_HEALTH__" ]; then
            echo "Executing nginx health diagnostics in staging"
            ssh $USER@$HOST "bash -s" <<'ENDSSH'
              set -euo pipefail
              cd /opt/dorami

              echo "=== docker compose ps (nginx) ==="
              docker compose -f docker-compose.base.yml -f docker-compose.staging.yml ps nginx || true

              echo "=== docker inspect (state/health) ==="
              docker inspect dorami-nginx-1 --format 'status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}'

              echo "=== docker inspect (health logs last 10) ==="
              docker inspect dorami-nginx-1 --format '{{range .State.Health.Log}}{{.Start}} exit={{.ExitCode}} output={{printf "%q" .Output}}{{println}}{{end}}' | tail -n 10 || true

              echo "=== nginx container logs (tail 120) ==="
              docker compose -f docker-compose.base.yml -f docker-compose.staging.yml logs --tail=120 nginx || true

              echo "=== inside nginx container ==="
              docker exec dorami-nginx-1 sh -lc '
                echo "wget=$(command -v wget || echo not-found)";
                wget -q -S -O- http://localhost/health >/tmp/health.out 2>/tmp/health.err || true;
                echo "--- health.out ---";
                cat /tmp/health.out || true;
                echo "--- health.err ---";
                cat /tmp/health.err || true;
                echo "--- nginx -t ---";
                nginx -t
              '
          ENDSSH
          else
            echo "Executing: $CMD"
            ssh $USER@$HOST "cd /opt/dorami && $CMD"
          fi
