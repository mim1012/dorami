# Staging Deployment Workflow
# Automatically deploys to staging when code is pushed to develop branch
# Can also be triggered manually

name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests before deployment'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: staging-deployment
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/dorami

jobs:
  # ===========================================
  # Run CI Tests First
  # ===========================================
  test:
    name: Run Tests
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
    uses: ./.github/workflows/ci.yml

  # ===========================================
  # Build and Push Docker Images (unified)
  # ===========================================
  build:
    name: Build Images
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    uses: ./.github/workflows/build-images.yml
    permissions:
      contents: read
      packages: write

  # ===========================================
  # Deploy to Staging Server
  # ===========================================
  deploy:
    name: Deploy to Staging
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    env:
      # Centralized staging service URLs — avoids scattering raw localhost strings
      # throughout shell steps. These are correct for SSH-context health checks
      # (commands run ON the staging host via SSH, so localhost resolves there).
      STAGING_BACKEND_URL: http://localhost:3001
      STAGING_FRONTEND_URL: http://localhost:3000
      STAGING_SRS_API_URL: http://localhost:1985
      STAGING_NGINX_URL: http://localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          mkdir -p ~/.ssh
          KEY_OK=false

          # Try PEM format first
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1; then
            echo "✓ SSH key loaded (raw PEM)"
            KEY_OK=true
          fi

          # If PEM failed, try Base64 format
          if [ "$KEY_OK" = "false" ]; then
            # Remove all whitespace including newlines before base64 decode
            printf '%s' "$SSH_KEY" | tr -d ' \r\n' > /tmp/ssh_key_b64
            KEY_B64_LEN=$(wc -c < /tmp/ssh_key_b64)
            echo "Base64 key length after whitespace removal: $KEY_B64_LEN"

            if base64 -d < /tmp/ssh_key_b64 > ~/.ssh/id_rsa 2>/tmp/b64_error.txt; then
              chmod 600 ~/.ssh/id_rsa
              KEY_PEM_LEN=$(wc -c < ~/.ssh/id_rsa)
              echo "Decoded PEM key length: $KEY_PEM_LEN"

              if ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1; then
                echo "✓ SSH key loaded (base64)"
                KEY_OK=true
              else
                echo "✗ Decoded key failed ssh-keygen validation"
                head -1 ~/.ssh/id_rsa
              fi
            else
              echo "✗ Base64 decode failed:"
              cat /tmp/b64_error.txt
            fi
            rm -f /tmp/ssh_key_b64 /tmp/b64_error.txt
          fi

          if [ "$KEY_OK" = "false" ]; then
            echo "ERROR: SSH key invalid. len=${#SSH_KEY} has_begin=$(printf '%s' "$SSH_KEY" | grep -c BEGIN || echo 0)"
            exit 1
          fi
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Validate image tag format
        id: image_tag
        env:
          BUILD_IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          # Use GITHUB_SHA as fallback if build output not available
          IMAGE_TAG="${BUILD_IMAGE_TAG:-sha-${GITHUB_SHA}}"
          if [[ ! "$IMAGE_TAG" =~ ^sha-[0-9a-f]{40}$ ]]; then
            echo "ERROR: IMAGE_TAG must match sha-<40hex>, got: ${IMAGE_TAG}"
            exit 1
          fi
          echo "Validated IMAGE_TAG: ${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Validate environment variables
        env:
          KAKAO_CLIENT_ID: ${{ secrets.STAGING_KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.STAGING_KAKAO_CLIENT_SECRET }}
          KAKAO_CALLBACK_URL: ${{ secrets.STAGING_KAKAO_CALLBACK_URL }}
        run: |
          echo "=== Validating required environment variables ==="
          MISSING_VARS=()

          if [ -z "$KAKAO_CLIENT_ID" ]; then
            MISSING_VARS+=("STAGING_KAKAO_CLIENT_ID")
          else
            echo "✓ STAGING_KAKAO_CLIENT_ID is set"
          fi

          if [ -z "$KAKAO_CLIENT_SECRET" ]; then
            MISSING_VARS+=("STAGING_KAKAO_CLIENT_SECRET")
          else
            echo "✓ STAGING_KAKAO_CLIENT_SECRET is set"
          fi

          if [ -z "$KAKAO_CALLBACK_URL" ]; then
            MISSING_VARS+=("STAGING_KAKAO_CALLBACK_URL")
          else
            echo "✓ STAGING_KAKAO_CALLBACK_URL is set"
          fi

          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo "❌ ERROR: Missing required GitHub Actions secrets:"
            for var in "${MISSING_VARS[@]}"; do
              echo "   - $var"
            done
            exit 1
          fi

          echo "✅ All required Kakao OAuth environment variables are set"

      - name: Deploy via SSH
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.image_tag }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          STAGING_URL_VAR: ${{ vars.STAGING_URL }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KAKAO_CLIENT_ID: ${{ secrets.STAGING_KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.STAGING_KAKAO_CLIENT_SECRET }}
          KAKAO_CALLBACK_URL: ${{ secrets.STAGING_KAKAO_CALLBACK_URL }}
          ADMIN_EMAILS: ${{ secrets.STAGING_ADMIN_EMAILS }}
        run: |
          # Validate variables are available before SSH
          echo "Pre-SSH validation:"
          echo "  IMAGE_TAG=${IMAGE_TAG}"
          echo "  GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "  GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}"
          echo "  GHCR_TOKEN=${GHCR_TOKEN:0:20}..." # Show first 20 chars only

          ssh $USER@$HOST << ENDSSH
            set -ex

            # Variables expanded by runner before SSH transmission (unquoted heredoc)
            export IMAGE_TAG="${IMAGE_TAG}"
            export GITHUB_REF_NAME="${GITHUB_REF_NAME}"
            export GITHUB_REPOSITORY_OWNER="${GITHUB_REPOSITORY_OWNER}"
            export STAGING_URL_VAR="${STAGING_URL_VAR}"
            export GHCR_TOKEN="${GHCR_TOKEN}"
            export KAKAO_CLIENT_ID="${KAKAO_CLIENT_ID}"
            export KAKAO_CLIENT_SECRET="${KAKAO_CLIENT_SECRET}"
            export KAKAO_CALLBACK_URL="${KAKAO_CALLBACK_URL}"
            export ADMIN_EMAILS="${ADMIN_EMAILS}"

            echo "SSH connection successful"
            echo "PWD: \$(pwd)"
            echo "Current user: \$(whoami)"

            cd /opt/dorami
            echo "Changed to /opt/dorami"
            ls -la /opt/dorami | head -10

            echo "=== Pulling latest code ==="
            git fetch origin "${GITHUB_REF_NAME}"

            echo "=== Checking for docker-compose file changes ==="
            COMPOSE_CHANGES=$(git diff HEAD origin/"${GITHUB_REF_NAME}" -- docker-compose*.yml infrastructure/ nginx/ | wc -l)
            if [ "$COMPOSE_CHANGES" -gt 0 ]; then
              echo "⚠️  WARNING: docker-compose/infrastructure/nginx config changes detected"
              git diff HEAD origin/"${GITHUB_REF_NAME}" -- docker-compose*.yml infrastructure/ nginx/ | head -30
              echo "⚠️  These changes will be applied. Ensure compatibility with deployed services."
            fi

            echo "=== Verifying image ↔ code commit parity ==="
            CURRENT_COMMIT=$(git rev-parse HEAD)
            IMAGE_COMMIT="${IMAGE_TAG#sha-}"
            if [ "$CURRENT_COMMIT" != "$IMAGE_COMMIT" ]; then
              echo "⚠️  NOTICE: Code commit ≠ Image commit (expected for staging)"
              echo "   Code: $CURRENT_COMMIT"
              echo "   Image: $IMAGE_COMMIT"
              echo "   Reason: git reset --hard fetches latest, but Docker image is immutable"
              echo "   This is OK for staging; production should enforce commit parity"
            fi

            # Clean up uploads directory to handle permission issues from previous Docker runs
            # The uploads directory is managed by Docker and not tracked in git anymore
            echo "=== Checking uploads directory state before cleanup ==="
            ls -ld /opt/dorami/backend/uploads 2>&1 || echo "uploads directory doesn't exist yet"
            echo "=== Attempting to remove uploads directory ==="
            rm -rf /opt/dorami/backend/uploads && echo "✓ Successfully removed uploads directory" || echo "WARNING: Could not remove uploads directory"
            git reset --hard origin/${GITHUB_REF_NAME}

            echo "=== Recreating .env.staging (deleted by git reset) ==="
            cat > /opt/dorami/.env.staging << ENVEOF
# Database & Cache (localhost - docker internal)
DATABASE_URL="postgresql://postgres:postgres@postgres:5432/live_commerce_staging"
REDIS_URL="redis://redis:6379"

# JWT & Security
JWT_SECRET="dev-jwt-secret-change-in-production"
PROFILE_ENCRYPTION_KEY="012345678901234567890123456789ab012345678901234567890123456789ab"

# Kakao OAuth
KAKAO_CLIENT_ID="${KAKAO_CLIENT_ID}"
KAKAO_CLIENT_SECRET="${KAKAO_CLIENT_SECRET}"
KAKAO_CALLBACK_URL="${KAKAO_CALLBACK_URL}"

# Admin Emails
ADMIN_EMAILS="${ADMIN_EMAILS}"

# Server Configuration
APP_ENV="staging"
NODE_ENV="production"
PORT="3001"
CORS_ORIGINS="http://staging.doremi-live.com,http://localhost:3000,http://localhost:8080"
CSRF_ENABLED="true"

# Streaming (SRS local service)
RTMP_SERVER_URL="rtmp://staging.doremi-live.com:1935/live"
HLS_SERVER_URL="http://staging.doremi-live.com/hls"
MEDIA_SERVER_URL="http://localhost:8080"

# Development & Debugging
ENABLE_DEV_AUTH="true"
LOG_LEVEL="debug"
ENVEOF
            echo "✓ .env.staging recreated from deployment variables"
            cat /opt/dorami/.env.staging | grep -v "=" | head -5

            echo "=== Cleaning up old images ==="
            # Only prune dangling images and ghcr.io images (with repo filter)
            docker image prune -af --filter "until=72h" --filter "label=org.opencontainers.image.source=https://github.com/mim1012/dorami" || true
            docker builder prune -af --filter "until=72h" || true
            echo "✓ Cleanup complete (preserved non-dorami images)"
            echo "Disk usage after cleanup:"
            df -h / | tail -1

            echo "=== Logging into GHCR ==="
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${GITHUB_REPOSITORY_OWNER} --password-stdin

            echo "=== Loading environment for staging compose ==="
            # CRITICAL: IMAGE_TAG must come from deployment, never from .env.staging
            echo "Using deployment IMAGE_TAG: ${IMAGE_TAG}"
            export IMAGE_TAG=${IMAGE_TAG}
            export GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}
            export STAGING_HOST=${HOST}
            export KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
            export KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            export KAKAO_CALLBACK_URL=${KAKAO_CALLBACK_URL}
            export ADMIN_EMAILS=${ADMIN_EMAILS}

            if [ -f .env.staging ]; then
              # Load .env.staging but PRESERVE deployment values by exporting them AFTER
              set -a
              . ./.env.staging
              set +a
              # FINAL RESTORATION: Ensure deployment values override file values
              export IMAGE_TAG=${IMAGE_TAG}
              export GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}
              export STAGING_HOST=${HOST}
              export KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
              export KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
              export KAKAO_CALLBACK_URL=${KAKAO_CALLBACK_URL}
              export ADMIN_EMAILS=${ADMIN_EMAILS}
            fi

            echo "=== Fixing staging environment variables ==="
            bash scripts/fix-staging-env.sh

            echo "Final IMAGE_TAG: ${IMAGE_TAG}"
            docker compose -f docker-compose.base.yml -f docker-compose.staging.yml pull || true
            echo "=== Verifying pulled staging image tags are immutable sha ==="
            # Images were successfully pulled above, so they already exist with immutable sha tags
            if [[ "$IMAGE_TAG" =~ ^sha-[0-9a-f]{40}$ ]]; then
              echo "✓ Image tag is immutable sha format: $IMAGE_TAG"
            else
              echo "WARNING: IMAGE_TAG is not in immutable sha format: $IMAGE_TAG"
              echo "This should not happen if docker image build completed successfully"
            fi

            echo "=== Ensuring uploads directory exists and is writable ==="
            # Just create the directory - docker will handle permissions on container startup
            mkdir -p /opt/dorami/backend/uploads
            chmod 777 /opt/dorami/backend/uploads || true
            echo "✓ Uploads directory ready"

            echo "=== SSL Certificate Setup Skipped for Staging ==="
            echo "⚠️  Staging environment runs on HTTP only. For production, configure domain-based HTTPS."

            echo "=== Restarting services ==="
            # Stop containers WITHOUT removing volumes (preserves database)
            docker compose -f docker-compose.base.yml -f docker-compose.staging.yml down --remove-orphans || true
            sleep 2

            # Kill anything remaining on port 8080
            sudo fuser -k 8080/tcp 2>/dev/null || true
            sleep 1

            # Start services
            docker compose -f docker-compose.base.yml -f docker-compose.staging.yml up -d

            echo "=== Resolving any failed migrations ==="
            docker compose -f docker-compose.base.yml -f docker-compose.staging.yml run --rm -T backend npx prisma migrate resolve --rolled-back 20260224000000_add_free_shipping_threshold < /dev/null 2>/dev/null || true

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.base.yml -f docker-compose.staging.yml run --rm -T backend npx prisma migrate deploy < /dev/null

            echo "=== Cleaning up old images ==="
            docker image prune -af --filter "until=1h"

            echo "=== Checking service health ==="
            for i in 1 2 3 4 5 6; do
              if curl -sf ${STAGING_BACKEND_URL}/api/health/live > /dev/null 2>&1; then
                echo "Backend healthy!"
                break
              fi
              if [ "\$i" = "6" ]; then
                echo "Backend health check failed after 6 attempts"
                docker compose -f docker-compose.base.yml -f docker-compose.staging.yml logs backend --tail=50
                exit 1
              fi
              echo "Waiting for backend... (attempt \$i/6)"
              sleep 15
            done

            for i in 1 2 3 4 5 6; do
              if curl -sf ${STAGING_FRONTEND_URL} > /dev/null 2>&1; then
                echo "Frontend healthy!"
                break
              fi
              if [ "\$i" = "6" ]; then
                echo "Frontend health check failed after 6 attempts"
                docker compose -f docker-compose.base.yml -f docker-compose.staging.yml logs frontend --tail=50
                exit 1
              fi
              echo "Waiting for frontend... (attempt \$i/6)"
              sleep 10
            done

            echo "=== Deployment complete ==="
          ENDSSH

      - name: Notify Success
        if: success()
        run: |
          echo "Staging deployment successful!"
          echo "Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "URL: ${{ secrets.STAGING_URL }}"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Staging deployment failed!"
          exit 1

  # Smoke tests and soak gates removed for hotfix — deploy only
