# Notify CI/CD result via Telegram
# Triggers when key workflows complete (success or failure)

name: Notify CI/CD Result

on:
  workflow_run:
    workflows:
      - "Deploy to Staging"
      - "Deploy to Production"
      - "CI"
    types:
      - completed

jobs:
  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Get failed jobs info
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        id: failed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | {name: .name, step: (.steps[] | select(.conclusion == "failure") | .name)}] | map("\(.name) → \(.step)") | join("\n")' 2>/dev/null || echo "상세 정보 조회 실패")
          echo "FAILED_JOBS<<EOF" >> "$GITHUB_OUTPUT"
          echo "$JOBS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${COMMIT:0:7}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"

          if [ "$CONCLUSION" = "success" ]; then
            MSG="✅ *CI/CD 성공*%0A워크플로우: \`${WORKFLOW}\`%0A브랜치: \`${BRANCH}\` (${SHORT_SHA})%0A[로그 보기](${RUN_URL})"
          else
            FAILED="${{ steps.failed.outputs.FAILED_JOBS }}"
            MSG="🚨 *CI/CD 실패*%0A워크플로우: \`${WORKFLOW}\`%0A브랜치: \`${BRANCH}\` (${SHORT_SHA})%0A실패 항목:%0A\`\`\`%0A${FAILED}%0A\`\`\`%0A[로그 보기](${RUN_URL})"
          fi

          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true"
          else
            echo "⚠️ TELEGRAM_BOT_TOKEN not set, skipping notification"
          fi
