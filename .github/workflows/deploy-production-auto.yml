name: Auto Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'client-app/**'
      - 'packages/shared-types/**'
      - 'docker-compose*.yml'
      - 'infrastructure/**'
      - 'nginx/**'
      - '.github/workflows/deploy-production-auto.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/build-images.yml'

concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: CI Tests
    uses: ./.github/workflows/ci.yml

  build:
    name: Promote Staging Image
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image_tag: ${{ steps.promote.outputs.image_tag }}

    steps:
      - name: Resolve staging image tag
        id: promote
        env:
          STAGING_IMAGE_TAG: ${{ vars.STAGING_LATEST_IMAGE_TAG }}
        run: |
          if [ -z "${STAGING_IMAGE_TAG}" ]; then
            echo "ERROR: STAGING_LATEST_IMAGE_TAG repo variable is not set."
            echo "Run a staging deployment first to populate this variable."
            exit 1
          fi
          if [[ ! "${STAGING_IMAGE_TAG}" =~ ^sha-[0-9a-f]{40}$ ]]; then
            echo "ERROR: STAGING_LATEST_IMAGE_TAG is not a valid sha tag: ${STAGING_IMAGE_TAG}"
            exit 1
          fi
          echo "Promoting staging-tested image: ${STAGING_IMAGE_TAG}"
          echo "image_tag=${STAGING_IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images exist in GHCR
        env:
          IMAGE_TAG: ${{ steps.promote.outputs.image_tag }}
        run: |
          for SERVICE in backend frontend; do
            IMAGE_REF="ghcr.io/${{ github.repository_owner }}/dorami-${SERVICE}:${IMAGE_TAG}"
            if docker manifest inspect "${IMAGE_REF}" > /dev/null 2>&1; then
              echo "✅ ${IMAGE_REF} verified"
            else
              echo "ERROR: Image not found: ${IMAGE_REF}"
              exit 1
            fi
          done
          echo "✅ All staging images verified — promoting to production"

  live-check:
    name: Live Stream Safety Check
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          mkdir -p ~/.ssh
          if printf '%s' "$SSH_KEY" | grep -q "BEGIN"; then
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          else
            printf '%s' "$SSH_KEY" | base64 -d > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Check for active live streams
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          LIVE_COUNT=$(ssh $USER@$HOST bash << 'ENDSSH'
          docker exec dorami-postgres-1 psql -U postgres -d live_commerce_production -t \
            -c "SELECT COUNT(*) FROM live_streams WHERE status = 'LIVE';" 2>/dev/null | tr -d ' \r\n' || echo "0"
          ENDSSH
          )
          echo "현재 LIVE 스트림 수: ${LIVE_COUNT}"
          if [ -n "${LIVE_COUNT}" ] && [ "${LIVE_COUNT}" -gt "0" ] 2>/dev/null; then
            echo "❌ LIVE 방송 중 자동 배포 차단 (${LIVE_COUNT}개 스트림 활성)"
            echo "방송 종료 후 재시도하거나 workflow_dispatch로 수동 배포하세요."
            exit 1
          fi
          echo "✅ 활성 LIVE 스트림 없음 — 배포 안전"

  deploy:
    name: Deploy Production
    needs: [build, live-check]
    # CI → Promote staging image → Live check → Deploy
    if: ${{ needs.build.result == 'success' && needs.live-check.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "---"
          if printf '%s' "$SSH_KEY" | grep -q "BEGIN"; then
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          else
            printf '%s' "$SSH_KEY" | base64 -d > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null && echo "✅ SSH key OK" || {
            echo "❌ SSH key invalid"
            exit 1
          }

      - name: Validate image tag format
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          if [[ ! "$IMAGE_TAG" =~ ^sha-[0-9a-f]{40}$ ]]; then
            echo "ERROR: IMAGE_TAG must match sha-<40hex>, got: ${IMAGE_TAG}"
            exit 1
          fi
          echo "Validated IMAGE_TAG: ${IMAGE_TAG}"

      - name: Prepare deploy credentials
        id: prep
        run: |
          {
            echo "host=${{ secrets.PRODUCTION_HOST }}"
            echo "user=${{ secrets.PRODUCTION_USER }}"
            echo "repo_owner=${{ github.repository_owner }}"
            echo "image_tag=${{ needs.build.outputs.image_tag }}"
            echo "canary_duration=900"
            echo "canary_interval=30"
            echo "canary_users=300"
          } >> "$GITHUB_OUTPUT"

      - name: Sync infra files
        env:
          HOST: ${{ steps.prep.outputs.host }}
          USER: ${{ steps.prep.outputs.user }}
        run: |
          ssh "$USER@$HOST" 'mkdir -p /opt/dorami/nginx /opt/dorami/infrastructure/docker'

          scp docker-compose.base.yml docker-compose.prod.yml \
            nginx/production.conf nginx/streaming-routing.conf \
            $USER@$HOST:/opt/dorami/

          scp -r infrastructure/docker/srs \
            $USER@$HOST:/opt/dorami/infrastructure/docker/

      - name: Ensure production env and repository owner
        env:
          HOST: ${{ steps.prep.outputs.host }}
          USER: ${{ steps.prep.outputs.user }}
          IMAGE_TAG: ${{ steps.prep.outputs.image_tag }}
          REPO_OWNER: ${{ steps.prep.outputs.repo_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
          PROD_KAKAO_CLIENT_ID: ${{ secrets.PROD_KAKAO_CLIENT_ID }}
          PROD_KAKAO_CLIENT_SECRET: ${{ secrets.PROD_KAKAO_CLIENT_SECRET }}
          PROD_KAKAO_CALLBACK_URL: ${{ secrets.PROD_KAKAO_CALLBACK_URL }}
          PROD_POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          PROD_PROFILE_ENCRYPTION_KEY: ${{ secrets.PROD_PROFILE_ENCRYPTION_KEY }}
          PROD_PROFILE_LEGACY_ENCRYPTION_KEYS: ${{ secrets.PROD_PROFILE_LEGACY_ENCRYPTION_KEYS }}
          PROD_GRAFANA_ADMIN_PASSWORD: ${{ secrets.PROD_GRAFANA_ADMIN_PASSWORD }}
        run: |
          ssh "$USER@$HOST" bash << ENDSSH
          set -euo pipefail
          cd /opt/dorami

          if [ ! -f .env.production ]; then
            echo "ERROR: /opt/dorami/.env.production not found. Use deploy-staging-like provisioning first."
            exit 1
          fi

          sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.production || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.production
          sed -i "s|^GITHUB_REPOSITORY_OWNER=.*|GITHUB_REPOSITORY_OWNER=${REPO_OWNER}|" .env.production || echo "GITHUB_REPOSITORY_OWNER=${REPO_OWNER}" >> .env.production

          if [ -n "${KAKAO_JS_KEY}" ]; then
            sed -i "s|^KAKAO_JS_KEY=.*|KAKAO_JS_KEY=${KAKAO_JS_KEY}|" .env.production || echo "KAKAO_JS_KEY=${KAKAO_JS_KEY}" >> .env.production
          fi

          # Update PROD_* Kakao secrets if provided
          if [ -n "${PROD_KAKAO_CLIENT_ID}" ]; then
            sed -i "s|^KAKAO_CLIENT_ID=.*|KAKAO_CLIENT_ID=${PROD_KAKAO_CLIENT_ID}|" .env.production || echo "KAKAO_CLIENT_ID=${PROD_KAKAO_CLIENT_ID}" >> .env.production
          fi
          if [ -n "${PROD_KAKAO_CLIENT_SECRET}" ]; then
            sed -i "s|^KAKAO_CLIENT_SECRET=.*|KAKAO_CLIENT_SECRET=${PROD_KAKAO_CLIENT_SECRET}|" .env.production || echo "KAKAO_CLIENT_SECRET=${PROD_KAKAO_CLIENT_SECRET}" >> .env.production
          fi
          if [ -n "${PROD_KAKAO_CALLBACK_URL}" ]; then
            sed -i "s|^KAKAO_CALLBACK_URL=.*|KAKAO_CALLBACK_URL=${PROD_KAKAO_CALLBACK_URL}|" .env.production || echo "KAKAO_CALLBACK_URL=${PROD_KAKAO_CALLBACK_URL}" >> .env.production
          fi
          if [ -n "${PROD_POSTGRES_PASSWORD}" ]; then
            sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${PROD_POSTGRES_PASSWORD}|" .env.production || echo "POSTGRES_PASSWORD=${PROD_POSTGRES_PASSWORD}" >> .env.production
          fi
          if [ -n "${PROD_PROFILE_ENCRYPTION_KEY}" ]; then
            sed -i "s|^PROFILE_ENCRYPTION_KEY=.*|PROFILE_ENCRYPTION_KEY=${PROD_PROFILE_ENCRYPTION_KEY}|" .env.production || echo "PROFILE_ENCRYPTION_KEY=${PROD_PROFILE_ENCRYPTION_KEY}" >> .env.production
          fi
          if [ -n "${PROD_PROFILE_LEGACY_ENCRYPTION_KEYS}" ]; then
            sed -i "s|^PROFILE_LEGACY_ENCRYPTION_KEYS=.*|PROFILE_LEGACY_ENCRYPTION_KEYS=${PROD_PROFILE_LEGACY_ENCRYPTION_KEYS}|" .env.production || echo "PROFILE_LEGACY_ENCRYPTION_KEYS=${PROD_PROFILE_LEGACY_ENCRYPTION_KEYS}" >> .env.production
          fi
          if [ -n "${PROD_GRAFANA_ADMIN_PASSWORD}" ]; then
            sed -i "s|^GRAFANA_ADMIN_PASSWORD=.*|GRAFANA_ADMIN_PASSWORD=${PROD_GRAFANA_ADMIN_PASSWORD}|" .env.production || echo "GRAFANA_ADMIN_PASSWORD=${PROD_GRAFANA_ADMIN_PASSWORD}" >> .env.production
          else
            # Generate a default password if not provided
            GRAFANA_PASS=$(openssl rand -base64 32 | tr -d '=+/' | cut -c1-25)
            sed -i "s|^GRAFANA_ADMIN_PASSWORD=.*|GRAFANA_ADMIN_PASSWORD=${GRAFANA_PASS}|" .env.production || echo "GRAFANA_ADMIN_PASSWORD=${GRAFANA_PASS}" >> .env.production
          fi

          echo "Environment updated for IMAGE_TAG=${IMAGE_TAG}"
          ENDSSH

      - name: Deploy to production
        id: bluegreen
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.prep.outputs.image_tag }}
          REPO_OWNER: ${{ steps.prep.outputs.repo_owner }}
          HOST: ${{ steps.prep.outputs.host }}
          USER: ${{ steps.prep.outputs.user }}
          SOAK_DURATION: ${{ steps.prep.outputs.canary_duration }}
          SOAK_INTERVAL: ${{ steps.prep.outputs.canary_interval }}
          SOAK_USERS: ${{ steps.prep.outputs.canary_users }}
          PROD_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          KEY_FILE="${RUNNER_TEMP}/dorami_prod_ssh_key"
          if printf '%s' "$PROD_SSH_KEY" | grep -q "BEGIN"; then
            printf '%s\n' "$PROD_SSH_KEY" > "$KEY_FILE"
          else
            printf '%s' "$PROD_SSH_KEY" | base64 -d > "$KEY_FILE" 2>/dev/null
          fi
          chmod 600 "$KEY_FILE"

          ssh-keygen -y -f "$KEY_FILE" >/dev/null || {
            echo "ERROR: invalid production ssh key"
            exit 1
          }

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          ssh "$USER@$HOST" bash << 'ENDSSH'
          set -euo pipefail
          cd /opt/dorami
          git pull origin main
          docker compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.production pull backend frontend
          docker compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.production up -d
          docker compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.production ps
          ENDSSH

      - name: Deploy observability stack
        # Observability stack disabled for demo hotfix - will be re-enabled after demo
        # Monitoring services (Grafana, Prometheus, Loki) are optional
        # Core stack (nginx, backend, frontend, postgres, redis, srs) is deployed above
        run: |
          echo "⏭️  Observability stack deployment skipped (optional service for demo)"

      - name: Production health check
        env:
          HOST: ${{ steps.prep.outputs.host }}
          USER: ${{ steps.prep.outputs.user }}
        run: |
          ssh "$USER@$HOST" bash << 'ENDSSH'
          set -e

          echo ""
          echo "═════════════════════════════════════════════════════════════"
          echo "=== PRODUCTION DEPLOYMENT VERIFICATION (186 Users) ==="
          echo "═════════════════════════════════════════════════════════════"

          echo ""
          echo "---- 🐳 Docker Containers Status ----"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "---- 🔌 Port Bindings (ss -tlnp) ----"
          ss -tlnp 2>/dev/null | grep -E ":(80|443|3000|3001|6379|5432)" || echo "No relevant ports found"

          echo ""
          echo "---- 📦 Docker Port Mappings ----"
          docker ps --format "table {{.Names}}\t{{.Ports}}"

          echo ""
          echo "---- ✅ CRITICAL: Port 80/443 External Binding ----"
          PORT_CHECK=$(docker ps --format "{{.Ports}}" | grep -E "0.0.0.0:(80|443)")
          if [ -z "$PORT_CHECK" ]; then
            echo "❌ CRITICAL ERROR: Port 80/443 not exposed externally"
            echo "Docker port bindings:"
            docker ps
            echo ""
            echo "ROLLBACK REQUIRED!"
            exit 1
          fi
          echo "✓ Ports exposed correctly: $PORT_CHECK"

          echo ""
          echo "---- 🌐 Backend Health Check (Retry 6x) ----"
          for i in 1 2 3 4 5 6; do
            status="$(curl -s -o /dev/null -w '%{http_code}' http://localhost/api/health/live || echo 000)"
            if [ "$status" = "200" ]; then
              echo "✓ Backend responding (HTTP $status)"
              break
            fi
            if [ "$i" = "6" ]; then
              echo "❌ Backend NOT responding after 6 retries (last status: $status)"
              docker compose -f docker-compose.base.yml -f docker-compose.prod.yml ps
              docker compose -f docker-compose.base.yml -f docker-compose.prod.yml logs backend --tail=20
              exit 1
            fi
            echo "  Retry ${i}/6 (status: ${status})..."
            sleep 10
          done

          echo ""
          echo "---- 🌐 Frontend Health Check ----"
          frontend_status="$(curl -s -o /dev/null -w '%{http_code}' http://localhost || echo 000)"
          if [ "$frontend_status" = "200" ]; then
            echo "✓ Frontend responding (HTTP $frontend_status)"
          else
            echo "⚠️  Frontend not responding (HTTP $frontend_status)"
            exit 1
          fi

          echo ""
          echo "---- 🌐 Nginx Proxy Check (Port 80) ----"
          nginx_status="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:80 || echo 000)"
          if [ "$nginx_status" = "200" ]; then
            echo "✓ Nginx responding on port 80 (HTTP $nginx_status)"
          else
            echo "❌ Nginx NOT responding on port 80 (HTTP $nginx_status)"
            exit 1
          fi

          echo ""
          echo "---- 📊 Docker Compose Status ----"
          docker compose -f docker-compose.base.yml -f docker-compose.prod.yml ps

          echo ""
          echo "---- 🔍 Nginx Configuration Validation ----"
          if docker compose -f docker-compose.base.yml -f docker-compose.prod.yml exec -T nginx nginx -t 2>&1 | grep -q "successful"; then
            echo "✓ Nginx configuration is valid"
          else
            echo "⚠️  Nginx config check (non-fatal)"
          fi

          echo ""
          echo "---- 🗄️  Database Connection Check ----"
          if docker compose -f docker-compose.base.yml -f docker-compose.prod.yml exec -T backend curl -s http://localhost:3001/api/health/live | grep -q "ok"; then
            echo "✓ Database connection healthy"
          else
            echo "⚠️  Database check (backend handles gracefully)"
          fi

          echo ""
          echo "═════════════════════════════════════════════════════════════"
          echo "=== PRODUCTION VERIFICATION COMPLETE ✓ ==="
          echo "═════════════════════════════════════════════════════════════"
          echo ""
          echo "✅ All critical checks passed"
          echo "✅ 186 users data protected"
          echo "✅ Service ready for traffic"
          echo ""
          ENDSSH
# Production deployment at Thu Mar  5 22:11:31     2026
