# Minimal Nginx profile for pre-switch blue/green canary.
# Shared in docker-compose.prod-blue-green.yml with profile "canary".
server {
  listen 80;
  server_name _;

  client_max_body_size 50M;

  access_log /var/log/nginx/access.log combined;
  error_log /var/log/nginx/error.log warn;

  # Use generated blue/green routing definitions.
  include /etc/nginx/conf.d/streaming-routing.conf;

  location /nginx_status {
    stub_status;
    access_log off;

    # Allow only internal IPs for monitoring/health checks
    allow 127.0.0.1;           # localhost
    allow ::1;                 # IPv6 localhost
    allow 172.17.0.0/16;       # Docker internal network
    allow 172.18.0.0/16;       # Docker Compose default network
    allow 172.19.0.0/16;       # Additional Docker networks
    allow 10.0.0.0/8;          # Private network (VPC, Docker)
    allow 192.168.0.0/16;      # Private network
    deny all;                  # Deny all others (public access blocked)
  }

  # Keep canary health simple.
  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
