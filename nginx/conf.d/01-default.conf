# Docker DNS resolver (for service discovery in compose)
resolver 127.0.0.11:53 valid=10s;
resolver_timeout 5s;

# Health check endpoint
server {
    listen 80 default_server;
    server_name _;
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# HTTP redirect to HTTPS (production)
server {
    listen 80;
    server_name www.doremi-live.com doremi-live.com;

    # Let's Encrypt challenges pass through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
