# Staging HTTP Configuration (No SSL required)
# Used for testing before production deployment
# Note: Rate limiting zones (auth_limit, chat_limit, api_limit, general_limit)
# are defined in infrastructure/docker/nginx/nginx.conf at http level.

upstream backend {
    server backend:3001;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream srs {
    server srs:8080;
    keepalive 32;
}

# Health check endpoint (required for docker healthcheck)
server {
    listen 80 default_server;
    server_name _;
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# Main HTTP server (staging environment)
server {
    listen 80;
    server_name staging.doremi-live.com localhost 54.180.94.30;
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # ============================================
    # Static Files & Media
    # ============================================
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Disable directory listing
        autoindex off;

        # Security: prevent script execution
        location ~ \.php$ {
            deny all;
        }
        location ~ \.sh$ {
            deny all;
        }
    }

    # ============================================
    # Streaming Routes (HTTP-FLV, HLS, WebSocket)
    # ============================================

    # HTTP-FLV (low-latency, primary streaming path)
    location /live/live/ {
        proxy_pass http://srs/live/live/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # HLS media playlist + TS segments
    location ~ ^/live/[^/]+\.(m3u8|ts) {
        proxy_pass http://srs;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_buffering off;
        proxy_request_buffering off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # Block /hls/hls/ CDN conflict path
    location /hls/hls/ {
        return 404;
    }

    # HLS master playlist + TS segment fallback path
    location /hls/ {
        proxy_pass http://srs/live/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_buffering off;
        proxy_request_buffering off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # WebSocket endpoint (Socket.IO)
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # ============================================
    # API Routes (/api)
    # ============================================

    # Auth refresh — Next.js Route Handler ensures Set-Cookie reaches the browser.
    # Exact match takes priority over the /api/auth prefix block below.
    location = /api/auth/refresh {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Auth routes (stricter rate limiting)
    location /api/auth {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # CSRF token bootstrap
    location = /api/csrf {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat endpoint
    location /api/chat/ {
        limit_req zone=chat_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Connection "";

        # Timeouts (extended for WebSocket + Live Streaming)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # ============================================
    # Health Check Endpoint
    # ============================================
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /nginx_status {
        stub_status;
        access_log off;
        allow all;
    }

    # ============================================
    # Next.js Static Assets
    # ============================================
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ============================================
    # Default - Next.js Frontend
    # ============================================
    location / {
        limit_req zone=general_limit burst=200 nodelay;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # Deny access to sensitive files
    # ============================================
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}
