# Nginx Production Configuration for Dorami Live Commerce
# This file handles SSL termination, routing, and load balancing for production
#
# Key characteristics:
# - All upstream services are accessed via Docker internal network
# - SSL termination at nginx (Let's Encrypt via certbot)
# - HTTP/2 enabled
# - Gzip compression enabled
# - Security headers for production
# - Rate limiting on sensitive endpoints
# - WebSocket support for real-time features

# Health check endpoint (required for docker healthcheck)
server {
    listen 80 default_server;
    server_name _;
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# Upstream Services (Docker DNS resolution)
# Note: Rate limiting zones are defined at http level in main nginx.conf or other files
upstream backend {
    server backend:3001;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream srs {
    server srs:8080;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name doremi-live.com www.doremi-live.com;
    client_max_body_size 50M;

    # Allow ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server (www.doremi-live.com)
server {
    listen 443 ssl http2;
    server_name www.doremi-live.com;
    client_max_body_size 50M;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/doremi-live.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doremi-live.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # Hide nginx version
    server_tokens off;

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================
    # Static Files & Media
    # ============================================
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Disable directory listing
        autoindex off;

        # Security: prevent script execution
        location ~ \.php$ {
            deny all;
        }
        location ~ \.sh$ {
            deny all;
        }
    }

    # ============================================
    # Streaming Routes (HTTP-FLV, HLS, WebSocket)
    # ============================================

    # HTTP-FLV (low-latency, primary streaming path)
    location /live/live/ {
        proxy_pass http://srs/live/live/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # HLS media playlist + TS segments
    location ~ ^/live/[^/]+\.(m3u8|ts) {
        proxy_pass http://srs;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_buffering off;
        proxy_request_buffering off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # Block /hls/hls/ CDN conflict path
    location /hls/hls/ {
        return 404;
    }

    # HLS master playlist + TS segment fallback path
    location /hls/ {
        proxy_pass http://srs/live/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_buffering off;
        proxy_request_buffering off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # WebSocket endpoint (Socket.IO)
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # ============================================
    # API Routes (/api)
    # ============================================

    # Auth refresh — Next.js Route Handler ensures Set-Cookie reaches the browser.
    # Exact match takes priority over the /api/auth prefix block below.
    location = /api/auth/refresh {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Auth routes (stricter rate limiting)
    location /api/auth {
        # limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Runtime config — Next.js Route Handler (app/api/config/route.ts)
    # Must be before the generic /api/ block to prevent proxying to backend.
    location = /api/config {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CSRF token bootstrap — Next.js Route Handler (app/api/csrf/route.ts)
    # Must be before the generic /api/ block to prevent proxying to backend.
    location = /api/csrf {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat endpoint — stricter rate limit; must appear before generic /api/ block
    location /api/chat/ {
        # limit_req zone=chat_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        # Rate limiting for API
        # limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # Keep-alive
        proxy_set_header Connection "";

        # Timeouts (extended for WebSocket + Live Streaming)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;      # 1 hour for WebSocket/Live Streaming
        proxy_read_timeout 3600s;      # 1 hour for WebSocket/Live Streaming
    }

    # ============================================
    # Health Check Endpoint
    # ============================================
    # Nginx health for LB/CI
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Exporter scrape endpoint for Prometheus nginx-exporter
    location /nginx_status {
        stub_status;
        access_log off;

        # Allow only internal IPs for monitoring/health checks
        allow 127.0.0.1;           # localhost
        allow ::1;                 # IPv6 localhost
        allow 172.17.0.0/16;       # Docker internal network
        allow 172.18.0.0/16;       # Docker Compose default network
        allow 172.19.0.0/16;       # Additional Docker networks
        allow 10.0.0.0/8;          # Private network (VPC, Docker)
        allow 192.168.0.0/16;      # Private network
        deny all;                  # Deny all others (public access blocked)
    }

    # ============================================
    # Next.js Static Assets (long-term cache)
    # ============================================

    # Next.js build output (hash-based filenames — safe for immutable caching)
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static files
    location /static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ============================================
    # Default - Next.js Frontend
    # ============================================
    location / {
        # limit_req zone=general_limit burst=200 nodelay;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # Deny access to sensitive files
    # ============================================
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}

# Redirect non-www HTTPS to www canonical
server {
    listen 443 ssl http2;
    server_name doremi-live.com;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/doremi-live.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doremi-live.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://www.doremi-live.com$request_uri;
}
