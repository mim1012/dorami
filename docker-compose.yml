version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: live_commerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dorami-internal

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dorami-internal

  # NestJS Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/live_commerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-12345-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-dev-kakao-client-id}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-dev-kakao-client-secret}
      KAKAO_CALLBACK_URL: ${KAKAO_CALLBACK_URL:-http://localhost:3000/auth/callback}
      PROFILE_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CSRF_ENABLED: "false"
      ADMIN_EMAILS: admin@dorami.shop
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - dorami-internal

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: client-app/Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      WS_URL: http://localhost:3001
      ENABLE_DEV_AUTH: 'true'
      KAKAO_CHANNEL_ID: '_NJMzX'
      BACKEND_URL: http://backend:3001
      MEDIA_SERVER_URL: http://srs:8080
    depends_on:
      - backend
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dorami-internal

  # SRS Media Server for Live Streaming (RTMP ingest → HTTP-FLV + HLS)
  srs:
    image: ossrs/srs:6
    restart: unless-stopped
    ports:
      - '1935:1935'  # RTMP
      - '8080:8080'  # HTTP-FLV + HLS
    volumes:
      - ./infrastructure/docker/srs/srs.conf:/usr/local/srs/conf/docker.conf:ro
    depends_on:
      - backend
    networks:
      - dorami-internal

volumes:
  postgres_data:
    name: dorami_postgres_data
  redis_data:
    name: dorami_redis_data

networks:
  dorami-internal:
    name: dorami-internal
    driver: bridge
