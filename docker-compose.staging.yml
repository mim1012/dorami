version: '3.8'

services:
  # PostgreSQL Database override
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-live_commerce_staging}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-live_commerce_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      dorami-internal:
        aliases:
          - postgres

  # Redis cache override
  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --maxmemory 256mb --maxmemory-policy volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      dorami-internal:
        aliases:
          - redis

  # Backend override (staging settings only)
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/dorami-backend:${IMAGE_TAG:?IMAGE_TAG required}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: staging
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-live_commerce_staging}?schema=public&connection_limit=20&pool_timeout=30
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PUBSUB_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_ADAPTER_ENABLED: "true"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?KAKAO_CLIENT_ID required}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET required}
      KAKAO_CALLBACK_URL: ${KAKAO_CALLBACK_URL:?KAKAO_CALLBACK_URL required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://staging.doremi-live.com}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ENABLE_DEV_AUTH: ${ENABLE_DEV_AUTH:-true}
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@dorami.shop}
      CSRF_ENABLED: "${CSRF_ENABLED:-false}"
      FRONTEND_URL: ${FRONTEND_URL:-http://staging.doremi-live.com}
      PROFILE_ENCRYPTION_KEY: ${PROFILE_ENCRYPTION_KEY:?PROFILE_ENCRYPTION_KEY required}
      RTMP_SERVER_URL: ${RTMP_SERVER_URL:-rtmp://staging.doremi-live.com:1935/live}
      RTMP_INTERNAL_URL: rtmp://srs:1935/live
      RTMP_EXTERNAL_URL: ${RTMP_EXTERNAL_URL:-rtmp://staging.doremi-live.com:1935/live}
      HLS_SERVER_URL: ${CDN_URL:-http://srs:8080/hls}
      SRS_API_URL: http://srs:1985
      SRS_WEBHOOK_SECRET: ${SRS_WEBHOOK_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@live-commerce.com}
      BIZGO_API_KEY: ${BIZGO_API_KEY:-}
      BIZGO_SENDER_KEY: ${BIZGO_SENDER_KEY:-}
      BIZGO_API_URL: ${BIZGO_API_URL:-https://mars.ibapi.kr/api/comm}
    expose:
      - 3001
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    dns:
      - 127.0.0.11
      - 8.8.8.8
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      dorami-internal:
        aliases:
          - backend

  # Frontend override (staging settings only)
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/dorami-frontend:${IMAGE_TAG:?IMAGE_TAG required}
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3001
      HOSTNAME: 0.0.0.0
      WS_URL: ${WS_URL:-wss://staging.doremi-live.com}
      CDN_URL: ${CDN_URL:-}
      NEXT_PUBLIC_KAKAO_JS_KEY: ${NEXT_PUBLIC_KAKAO_JS_KEY:-}
      KAKAO_EXTERNAL_ORIGIN: ${KAKAO_EXTERNAL_ORIGIN:-}
      ENABLE_DEV_AUTH: ${ENABLE_DEV_AUTH:?ENABLE_DEV_AUTH required}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: staging
      PREVIEW_ENABLED: ${PREVIEW_ENABLED:-false}
    expose:
      - 3000
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      dorami-internal:
        aliases:
          - frontend

  # Nginx override (80/443 with SSL + ACME path)
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/staging-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/uploads:/var/www/uploads
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      dorami-internal:
        aliases:
          - nginx

  # SRS Media Server (RTMP ingest → HTTP-FLV + HLS)
  srs:
    image: ossrs/srs:6
    restart: always
    depends_on:
      - backend
    links:
      - backend
    ports:
      - "1935:1935"
    # Port 8080 removed — HTTP-FLV/HLS traffic routes through nginx reverse proxy on internal network
    # Client requests: nginx (80/443) → proxy to srs:8080 (internal)
    volumes:
      - ./infrastructure/docker/srs/srs.conf:/usr/local/srs/conf/docker.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      dorami-internal:
        aliases:
          - srs

networks:
  dorami-internal:
    name: dorami-internal
    driver: bridge
    internal: false

volumes:
  certbot_www:
    name: dorami_certbot_www
  postgres_data:
    external: true
    name: dorami_postgres_data
  redis_data:
    external: true
    name: dorami_redis_data
