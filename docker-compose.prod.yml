# Docker Compose Production Overlay
# 사용법: docker-compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.production up -d
# Env: --env-file .env.production
#
# 특징:
# - Nginx 컨테이너가 80/443 포트 처리 (SSL termination, reverse proxy)
# - 리소스 제한: CPU/Memory 제한
# - 로깅: max-size/file 지정
# - 환경변수: 모두 필수 (:? 검증)
# - 네트워크: dorami-internal (internal=false for outbound)
#
# 🔴 CRITICAL RULE: Docker 내부 통신은 SERVICE NAME 사용
# ✅ proxy_pass http://backend:3001      (service name - correct)
# ❌ proxy_pass http://dorami-backend-prod:3001  (container_name - wrong, dns fails)

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 2g
    cpus: '2'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - dorami-internal

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: 3
    volumes:
      - redis_data_prod:/data
    networks:
      - dorami-internal

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-mim1012}/dorami-backend:${IMAGE_TAG:?IMAGE_TAG required}
    container_name: backend-prod
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - '127.0.0.1:3001:3001'  # Nginx container proxy only
    environment:
      NODE_ENV: production
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&sslmode=prefer&connection_limit=20&pool_timeout=30
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PUBSUB_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SRS_API_URL: http://srs:1985
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required (64+ chars)}
      PROFILE_ENCRYPTION_KEY: ${PROFILE_ENCRYPTION_KEY:?PROFILE_ENCRYPTION_KEY required}
      PROFILE_LEGACY_ENCRYPTION_KEYS: ${PROFILE_LEGACY_ENCRYPTION_KEYS:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?KAKAO_CLIENT_ID required}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET required}
      KAKAO_CALLBACK_URL: ${KAKAO_CALLBACK_URL:?KAKAO_CALLBACK_URL required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS required}
      RTMP_SERVER_URL: ${RTMP_SERVER_URL:-rtmp://www.doremi-live.com:1935/live}
      RTMP_INTERNAL_URL: rtmp://srs:1935/live
      RTMP_EXTERNAL_URL: ${RTMP_EXTERNAL_URL:-rtmp://www.doremi-live.com:1935/live}
      HLS_SERVER_URL: http://srs:8080/hls
      CSRF_ENABLED: 'true'
      DISABLE_CSRF: 'false'
      COOKIE_SECURE: 'true'
      ENABLE_DEV_AUTH: 'false'
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@dorami.shop}
      SENTRY_DSN: ${SENTRY_DSN:-}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      SRS_WEBHOOK_SECRET: ${SRS_WEBHOOK_SECRET:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1h}
      THROTTLE_DISABLED: ${THROTTLE_DISABLED:-false}
      THROTTLE_SHORT_LIMIT: ${THROTTLE_SHORT_LIMIT:-5000}
      THROTTLE_MEDIUM_LIMIT: ${THROTTLE_MEDIUM_LIMIT:-10000}
      THROTTLE_LONG_LIMIT: ${THROTTLE_LONG_LIMIT:-50000}
      AUTH_THROTTLE_LIMIT: ${AUTH_THROTTLE_LIMIT:-500}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: '2'
    volumes:
      - uploads_data:/app/uploads:rw
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 10
    networks:
      - dorami-internal

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-mim1012}/dorami-frontend:${IMAGE_TAG:?IMAGE_TAG required}
    container_name: dorami-frontend-prod
    restart: always
    expose:
      - 3000
    environment:
      NODE_ENV: production
      APP_ENV: production
      BACKEND_URL: ${BACKEND_URL:?BACKEND_URL required}
      MEDIA_SERVER_URL: ${MEDIA_SERVER_URL:?MEDIA_SERVER_URL required}
      WS_URL: ${WS_URL:?WS_URL required}
      CDN_URL: ${CDN_URL:-}
      ENABLE_DEV_AUTH: 'false'
      NEXT_PUBLIC_KAKAO_JS_KEY: ${NEXT_PUBLIC_KAKAO_JS_KEY:-}
      KAKAO_EXTERNAL_ORIGIN: ${KAKAO_EXTERNAL_ORIGIN:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    mem_limit: 512m
    cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    networks:
      - dorami-internal

  srs:
    image: ossrs/srs:6
    container_name: dorami-srs-prod
    restart: always
    ports:
      # SECURITY: RTMP port exposed to all interfaces — restrict via server firewall (ufw):
      #   ufw allow from <OBS_IP> to any port 1935 proto tcp
      #   ufw deny 1935
      # Never expose to 0.0.0.0 in production without IP whitelisting.
      - '1935:1935'  # RTMP ingest (restrict via ufw on host)
    volumes:
      - ./infrastructure/docker/srs/srs.conf:/usr/local/srs/conf/docker.conf:ro
    mem_limit: 1g
    cpus: '2'
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 10
    networks:
      - dorami-internal

  nginx:
    image: nginx:alpine
    container_name: dorami-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
      - srs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    networks:
      - dorami-internal

volumes:
  postgres_data_prod:
    external: true
    name: dorami_postgres_data  # CRITICAL: 139명 사용자 데이터
  redis_data_prod:
    external: true
    name: dorami_redis_data_prod
  uploads_data:
    external: true
    name: dorami_uploads_data

networks:
  dorami-internal:
    name: dorami-internal
    driver: bridge
    internal: false  # Allow outbound internet (OAuth, Sentry, etc.)
